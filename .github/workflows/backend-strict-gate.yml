name: Backend Strict Gate

on:
    pull_request:
        branches:
            - main
    push:
        branches:
            - main

jobs:
    strict-verify:
        runs-on: ubuntu-latest
        timeout-minutes: 60

        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Set up JDK 21
              uses: actions/setup-java@v5
              with:
                  distribution: temurin
                  java-version: "21"
                  cache: maven

            - name: Run strict verify (integration + analysis)
              shell: bash
              run: |
                  set -euo pipefail
                  mvn -B -ntp -Pintegration -Panalysis -DskipITs=false verify | tee strict-verify.log

            - name: Publish CI stats summary
              if: always()
              shell: bash
              run: |
                  set -euo pipefail

                  LOG_FILE="strict-verify.log"
                  TOTAL_TIME="N/A"
                  BUILD_STATUS="UNKNOWN"
                  WARNING_COUNT=0

                  if [[ -f "$LOG_FILE" ]]; then
                    TOTAL_TIME=$(grep -E "^\[INFO\] Total time:" "$LOG_FILE" | tail -1 | sed 's/^\[INFO\] Total time:[[:space:]]*//')
                    WARNING_COUNT=$(grep -c "\[WARNING\]" "$LOG_FILE" || true)
                    if grep -q "\[INFO\] BUILD SUCCESS" "$LOG_FILE"; then
                      BUILD_STATUS="SUCCESS"
                    else
                      BUILD_STATUS="FAILED"
                    fi
                  fi

                  TOTAL_TESTS=0
                  TOTAL_FAILURES=0
                  TOTAL_ERRORS=0
                  TOTAL_SKIPPED=0
                  while IFS= read -r report; do
                    tests=$(grep -o 'tests="[0-9]\+"' "$report" | head -1 | cut -d'"' -f2 || echo 0)
                    failures=$(grep -o 'failures="[0-9]\+"' "$report" | head -1 | cut -d'"' -f2 || echo 0)
                    errors=$(grep -o 'errors="[0-9]\+"' "$report" | head -1 | cut -d'"' -f2 || echo 0)
                    skipped=$(grep -o 'skipped="[0-9]\+"' "$report" | head -1 | cut -d'"' -f2 || echo 0)
                    TOTAL_TESTS=$((TOTAL_TESTS + tests))
                    TOTAL_FAILURES=$((TOTAL_FAILURES + failures))
                    TOTAL_ERRORS=$((TOTAL_ERRORS + errors))
                    TOTAL_SKIPPED=$((TOTAL_SKIPPED + skipped))
                  done < <(find . \( -path '*/target/surefire-reports/TEST-*.xml' -o -path '*/target/failsafe-reports/TEST-*.xml' \) -type f)

                  {
                    echo "## Backend Strict Gate Stats"
                    echo
                    echo "- Build status: ${BUILD_STATUS}"
                    echo "- Total time: ${TOTAL_TIME}"
                    echo "- Maven warnings: ${WARNING_COUNT}"
                    echo "- Tests: ${TOTAL_TESTS} (failures: ${TOTAL_FAILURES}, errors: ${TOTAL_ERRORS}, skipped: ${TOTAL_SKIPPED})"
                    echo
                    echo "### Reactor Summary"
                    if [[ -f "$LOG_FILE" ]]; then
                      grep -E "^\[INFO\] .*SUCCESS \[" "$LOG_FILE" | sed 's/^\[INFO\] //' || echo "No module summary found"
                    else
                      echo "No log file found"
                    fi
                  } >> "$GITHUB_STEP_SUMMARY"
