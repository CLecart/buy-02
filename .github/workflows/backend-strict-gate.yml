name: Backend Strict Gate

on:
    pull_request:
        branches:
            - main
    push:
        branches:
            - main

jobs:
    strict-verify:
        runs-on: ubuntu-latest
        timeout-minutes: 60

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up JDK 21
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: "21"
                  cache: maven

            - name: Run strict verify (integration + analysis)
              run: mvn -B -ntp -Pintegration -Panalysis -DskipITs=false verify
